name: Auto Releases

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.checker.outputs.should_run }}

    steps:
      - name: Checkout autobuild repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Clone GregTech Persistence
        run: |
          git clone --recursive https://github.com/Quantum-Studios-MC/GregTech-Persistence.git upstream

      - name: Get latest upstream hash
        working-directory: ./upstream
        run: echo "COMMIT_HASH=$(git rev-parse HEAD)" >> $GITHUB_ENV

      - name: Get previous built hash
        run: |
          if [ -f ./latest_commit ]; then
            echo "PREVIOUS_HASH=$(cat ./latest_commit)" >> $GITHUB_ENV
          else
            echo "PREVIOUS_HASH=" >> $GITHUB_ENV
          fi

      - name: Compare hashes
        id: checker
        run: |
          if [[ -n "$PREVIOUS_HASH" && "$COMMIT_HASH" == "$PREVIOUS_HASH" ]]; then
            echo "should_run=false" >> $GITHUB_OUTPUT
          else
            echo "should_run=true" >> $GITHUB_OUTPUT
          fi

  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: [check]
    if: needs.check.outputs.should_run == 'true'

    steps:
      - name: Checkout autobuild repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Clone GregTech Persistence
        run: |
          git clone --recursive https://github.com/Quantum-Studios-MC/GregTech-Persistence.git upstream

      - name: Get latest upstream hash
        working-directory: ./upstream
        run: echo "COMMIT_HASH=$(git rev-parse HEAD)" >> $GITHUB_ENV

      - name: Get previous built hash
        run: |
          if [ -f ./latest_commit ]; then
            echo "PREVIOUS_HASH=$(cat ./latest_commit)" >> $GITHUB_ENV
          else
            echo "PREVIOUS_HASH=" >> $GITHUB_ENV
          fi

      - name: Get latest describe
        working-directory: ./upstream
        run: echo "LATEST_DESCRIBE=$(git describe --tags --always)" >> $GITHUB_ENV

      - name: Get current date
        run: echo "CURRENT_DATE=$(date +'%Y%m%dT%H%M%S')" >> $GITHUB_ENV

      - name: Write release body
        working-directory: ./upstream
        run: |
          echo "Built from commit: [$COMMIT_HASH](https://github.com/Quantum-Studios-MC/GregTech-Persistence/commit/$COMMIT_HASH)" > body.txt
          echo >> body.txt
          echo "Changes since last autobuild:" >> body.txt
          echo >> body.txt
          git log --pretty=format:"- %h %s" $PREVIOUS_HASH..$COMMIT_HASH >> body.txt || true

      - name: Set up Java 8
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '8'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./upstream/gradlew

      - name: Inject Forge Maven repository
        working-directory: ./upstream
        run: |
          if [ -f repositories.gradle ]; then
            if ! grep -q "maven.minecraftforge.net" repositories.gradle; then
              python3 <<'PY'
from pathlib import Path

p = Path("repositories.gradle")
text = p.read_text()

block = """maven {
    name = 'Forge Maven'
    url = 'https://maven.minecraftforge.net'
}
"""

if "repositories {" in text:
    text = text.replace("repositories {", "repositories {\n" + block, 1)
else:
    raise SystemExit("Could not find repositories { in repositories.gradle")

p.write_text(text)
print("Injected Forge Maven into repositories.gradle")
PY
            fi
          else
            echo "repositories.gradle not found"
            exit 1
          fi
          
      - name: Build jar
        working-directory: ./upstream
        run: ./gradlew jar --no-daemon

      - name: Show built files
        run: find ./upstream/build/libs -maxdepth 1 -type f

      - name: Update stored hash
        run: echo "$COMMIT_HASH" > ./latest_commit

      - name: Commit updated hash
        uses: EndBug/add-and-commit@v9
        with:
          add: 'latest_commit'
          push: true
          tag: ${{ env.LATEST_DESCRIBE }}-${{ env.CURRENT_DATE }}

      - name: Create release
        uses: ncipollo/release-action@v1
        with:
          artifacts: 'upstream/build/libs/*.jar'
          bodyFile: 'upstream/body.txt'
          generateReleaseNotes: false
          tag: ${{ env.LATEST_DESCRIBE }}-${{ env.CURRENT_DATE }}