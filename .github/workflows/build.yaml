name: Auto Releases

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

concurrency:
  group: gregtech-persistence-autobuild
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.checker.outputs.should_run }}
      trigger_label: ${{ steps.trigger.outputs.trigger_label }}

    steps:
      - name: Checkout autobuild repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Determine trigger label
        id: trigger
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "trigger_label=manual" >> $GITHUB_OUTPUT
          else
            echo "trigger_label=on-push" >> $GITHUB_OUTPUT
          fi

      - name: Clone GregTech Persistence
        run: |
          git clone --recursive https://github.com/Quantum-Studios-MC/GregTech-Persistence.git upstream

      - name: Get latest upstream hash
        working-directory: ./upstream
        run: echo "COMMIT_HASH=$(git rev-parse HEAD)" >> $GITHUB_ENV

      - name: Get previous built hash
        run: |
          if [ -f ./latest_commit ]; then
            echo "PREVIOUS_HASH=$(cat ./latest_commit)" >> $GITHUB_ENV
          else
            echo "PREVIOUS_HASH=" >> $GITHUB_ENV
          fi

      - name: Compare hashes
        id: checker
        run: |
          if [[ -n "$PREVIOUS_HASH" && "$COMMIT_HASH" == "$PREVIOUS_HASH" ]]; then
            echo "should_run=false" >> $GITHUB_OUTPUT
          else
            echo "should_run=true" >> $GITHUB_OUTPUT
          fi

  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: [check]
    if: needs.check.outputs.should_run == 'true'

    steps:
      - name: Checkout autobuild repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Clone GregTech Persistence
        run: |
          git clone --recursive https://github.com/Quantum-Studios-MC/GregTech-Persistence.git upstream

      - name: Get latest upstream hash
        working-directory: ./upstream
        run: |
          echo "COMMIT_HASH=$(git rev-parse HEAD)" >> $GITHUB_ENV
          echo "SHORT_HASH=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Get previous built hash
        run: |
          if [ -f ./latest_commit ]; then
            echo "PREVIOUS_HASH=$(cat ./latest_commit)" >> $GITHUB_ENV
          else
            echo "PREVIOUS_HASH=" >> $GITHUB_ENV
          fi

      - name: Count previous releases
        run: |
          RELEASE_COUNT=$(curl -s https://api.github.com/repos/${{ github.repository }}/releases | jq 'length')
          AUTOBUILD_NUMBER=$((RELEASE_COUNT + 1))
          echo "AUTOBUILD_NUMBER=$AUTOBUILD_NUMBER" >> $GITHUB_ENV

      - name: Set release metadata
        run: |
          echo "RELEASE_NAME=Autobuild #${AUTOBUILD_NUMBER}" >> $GITHUB_ENV
          echo "RELEASE_TAG=autobuild-${AUTOBUILD_NUMBER}" >> $GITHUB_ENV
          echo "TRIGGER_LABEL=${{ needs.check.outputs.trigger_label }}" >> $GITHUB_ENV

      - name: Get current date
        run: |
          echo "CURRENT_DATE=$(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_ENV

      - name: Set up Java 8
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '8'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./upstream/gradlew

      - name: Patch LaunchWrapper typo in source
        working-directory: ./upstream
        run: |
          grep -R -l "net.minecraft:launchwrapper:1.17.2" . | while read -r file; do
            sed -i 's/net\.minecraft:launchwrapper:1\.17\.2/net.minecraft:launchwrapper:1.12/g' "$file"
            echo "Patched typo in $file"
          done

          grep -R -l "net.minecraft:launchwrapper:1.12.2" . | while read -r file; do
            sed -i 's/net\.minecraft:launchwrapper:1\.12\.2/net.minecraft:launchwrapper:1.12/g' "$file"
            echo "Patched typo in $file"
          done

      - name: Show patched launchwrapper lines
        working-directory: ./upstream
        run: |
          grep -R -n "launchwrapper" . || true

      - name: Build jar
        working-directory: ./upstream
        run: ./gradlew jar --no-daemon --stacktrace

      - name: Show built files
        run: find ./upstream/build/libs -maxdepth 1 -type f -name "*.jar"

      - name: Rename built jars
        working-directory: ./upstream/build/libs
        run: |
          FIRST_JAR=$(find . -maxdepth 1 -type f -name "*.jar" | head -n 1)
          if [ -z "$FIRST_JAR" ]; then
            echo "No jar found in build/libs"
            exit 1
          fi

          cp "$FIRST_JAR" gregtech-persistence-latest.jar
          cp "$FIRST_JAR" gregtech-persistence-${AUTOBUILD_NUMBER}-${SHORT_HASH}.jar

      - name: Write release body
        working-directory: ./upstream
        run: |
          {
            echo "# ${RELEASE_NAME}"
            echo
            echo "**Trigger:** ${TRIGGER_LABEL}"
            echo "**Built at:** ${CURRENT_DATE}"
            echo "**Upstream commit:** [\`${COMMIT_HASH}\`](https://github.com/Quantum-Studios-MC/GregTech-Persistence/commit/${COMMIT_HASH})"
            echo
            echo "## Changes since last autobuild"
            echo
            git log --pretty=format:"- %h %s" ${PREVIOUS_HASH}..${COMMIT_HASH} 2>/dev/null || echo "- Initial autobuild or previous hash unavailable"
          } > body.txt

      - name: Update stored hash
        run: echo "$COMMIT_HASH" > ./latest_commit

      - name: Commit updated hash
        uses: EndBug/add-and-commit@v9
        with:
          add: 'latest_commit'
          push: true

      - name: Create release
        uses: ncipollo/release-action@v1
        with:
          artifacts: 'upstream/build/libs/gregtech-persistence-latest.jar,upstream/build/libs/gregtech-persistence-${{ env.AUTOBUILD_NUMBER }}-${{ env.SHORT_HASH }}.jar'
          bodyFile: 'upstream/body.txt'
          name: ${{ env.RELEASE_NAME }}
          tag: ${{ env.RELEASE_TAG }}
          generateReleaseNotes: false
          artifactErrorsFailBuild: true